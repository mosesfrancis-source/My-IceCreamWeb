<section class="menu-page">
  <h2>Ice Cream Menu</h2>
  <input
    type="search"
    [(ngModel)]="search"
    (ngModelChange)="onSearchChange($event)"
    placeholder="Search by flavor or tag"
    aria-label="Search menu"
  />

  @if (filteredMenu$ | async; as items) {
    @if (items.length === 0) {
      <p class="empty-state">No menu items are available right now. Please check back soon.</p>
    } @else {
      <div class="grid">
        <app-menu-item
          *ngFor="let item of items"
          [item]="item"
          (add)="addToCart($event)"
        ></app-menu-item>
      </div>
    }
  }
</section>
